# /etc/gitlab-runner/config.toml
# Production-ready GitLab Runner configuration for Docker Executor

# How many jobs this runner can execute concurrently across all pipelines
concurrent = 4

# Checks for new jobs every 3 seconds
check_interval = 3

[session_server]
  session_timeout = 1800

[[runners]]
  name = "Enterprise Multi-Cloud Private Runner"
  url = "https://gitlab.com/"
  id = 1
  token = "GLRT-YOUR_RUNNER_TOKEN"
  token_obtained_at = 2026-06-27T12:00:00Z
  token_expires_at = 0001-01-01T00:00:00Z
  executor = "docker"
  
  # Runner tags mapping criteria
  tags = ["docker", "private", "azure"]

  [runners.custom_build_dir]
  [runners.cache]
    MaxUploadedArchiveSize = 104857600
    Type = "gcs" # Or "s3" / "azure" for distributed caching
    Shared = true
    [runners.cache.gcs]
      BucketName = "enterprise-runner-cache-bucket"
  
  [runners.docker]
    tls_verify = false
    image = "alpine:latest"
    privileged = false
    disable_entrypoint_overwrite = false
    oom_kill_disable = false
    disable_cache = false
    
    # Mount docker socket for docker commands, and local cache directory
    volumes = ["/var/run/docker.sock:/var/run/docker.sock", "/cache"]
    shm_size = 2147483648 # 2GB Shared Memory for fast container executions
