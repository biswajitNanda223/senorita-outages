# build-push-sync.yml
# Reusable GitLab CI/CD template for secure containerization and multi-cloud sync

.hadolint:
  stage: lint
  image: hadolint/hadolint:latest-alpine
  script:
    - hadolint Dockerfile

.build-gitlab-registry:
  stage: build
  image: docker:24.0.7
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker build --pull -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"

.trivy-scan:
  stage: test
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_NO_COLOR: "true"
  script:
    # Build cache directory
    - trivy image --download-db-only --no-progress
    # Scan for high/critical issues
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"

.sync-to-cloud:
  stage: deploy
  image: docker:24.0.7
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - chmod +x ./cicd/scripts/sync-registry.sh
  script:
    # Run sync helper script
    # Variables required: CLOUD_IMAGE, CLOUD_PROVIDER (azure/aws/gcp)
    - ./cicd/scripts/sync-registry.sh "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" "$CLOUD_IMAGE" "$CLOUD_PROVIDER"
