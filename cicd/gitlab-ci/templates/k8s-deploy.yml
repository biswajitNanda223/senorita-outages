# k8s-deploy.yml
# Reusable GitLab CI/CD template for Kubernetes validation and deployment

.k8s-lint:
  stage: lint
  image: stackrox/kube-linter:0.6.0-alpine
  script:
    # Recursively lint Kubernetes manifests directory
    - /kube-linter lint manifests/

.k8s-manifest-scan:
  stage: test
  image: aquasec/trivy:latest
  script:
    # Scan manifests for security holes
    - trivy config --exit-code 1 manifests/

.k8s-deploy:
  stage: deploy
  image: lachlanevenson/k8s-kubectl:v1.28.2
  script:
    # Ensure kubeconfig context is set up (usually injected via env vars or OIDC helper)
    - echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
    # Apply configurations
    - kubectl apply -R -f manifests/
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
