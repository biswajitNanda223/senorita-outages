apiVersion: v1
kind: ConfigMap
metadata:
  name: enterprise-app-config
  namespace: enterprise-apps
data:
  # Non-sensitive application variables
  PORT: "8080"
  DB_HOST: "sql-postgres-enterprise.private.postgres.database.azure.com"
  DB_PORT: "5432"
  DB_NAME: "postgres"
  REDIS_HOST: "redis-enterprise.private.redis.cache.windows.net"
  REDIS_PORT: "6379"
  REDIS_SSL: "true"
  LOG_LEVEL: "info"
  CLOUD_PROVIDER: "azure"
