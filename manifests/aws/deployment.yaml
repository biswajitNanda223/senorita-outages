apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-backend-deployment
  namespace: default
  labels:
    app: app-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-backend
  template:
    metadata:
      labels:
        app: app-backend
    spec:
      containers:
      - name: app-backend
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/enterprise-ecr-dev:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "500m"
            memory: "1024Mi"
          requests:
            cpu: "250m"
            memory: "512Mi"
        env:
        - name: DATABASE_URL
          value: "jdbc:postgresql://rds-postgres-enterprise.xxxxxxxxx.us-east-1.rds.amazonaws.com:5432/postgres"
---
apiVersion: v1
kind: Service
metadata:
  name: app-backend-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: app-backend
