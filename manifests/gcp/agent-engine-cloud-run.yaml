apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: cloudrun-agent-engine-prod
  namespace: default
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    spec:
      serviceAccountName: agent-engine-sa@enterprise-project.iam.gserviceaccount.com
      containers:
      - image: us-central1-docker.pkg.dev/enterprise-project/enterprise-registry-prod/agent-engine:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 1Gi
            cpu: 1000m
        env:
        - name: ENABLE_TRACING
          value: "true"
        - name: REDIS_HOST
          value: "10.100.0.4"
        - name: AGENT_WORKSPACE_BUCKET
          value: "enterprise-agent-workspace-prod"
      # VPC Access settings
      containerConcurrency: 80
