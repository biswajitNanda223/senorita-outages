apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-backend-gke
  namespace: default
  labels:
    app: app-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-backend
  template:
    metadata:
      labels:
        app: app-backend
    spec:
      containers:
      - name: app-backend
        image: us-central1-docker.pkg.dev/enterprise-devops-project/enterprise-registry-dev/app-backend:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: DB_HOST
          value: "10.10.100.3"
---
apiVersion: v1
kind: Service
metadata:
  name: app-backend-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: app-backend
